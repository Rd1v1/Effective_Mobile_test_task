services:
  backend:
    build:
      context: ./backend
    container_name: backend_http_server
    expose:
      - "8080"
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
#depends_on добавлен, чтобы nginx не упал с ошибкой, если не сможет подключиться к бэкенду.
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
